version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres_devmovel
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: teste
    ports:
        - "5434:5432"
    volumes:
        - postgres_data:/var/lib/postgresql/data
volumes:
    postgres_data:



